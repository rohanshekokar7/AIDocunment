version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./.env:/app/.env
    environment:
      - PYTHONUNBUFFERED=1
    # Uncomment the following to enable GPU support (requires nvidia-container-toolkit on host)
